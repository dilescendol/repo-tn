name: Source Health

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

concurrency:
  group: source-health-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  source-health:
    name: Probe Source Status
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate source status report
        run: python tools/source-health/check_sources.py

      - name: Commit generated status files
        shell: bash
        run: |
          if git diff --quiet README.md docs/SOURCE_STATUS.md; then
            echo "No source status changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs/SOURCE_STATUS.md
          git commit -m "chore: update source web status"
          git push
